name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag and release name suffix, for example v1.0.0-beta.1"
        required: true
        default: "v1.0.0-beta.1"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-msi:
    name: Windows MSI
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - run: npm ci

      - run: npm test

      - run: cargo test
        working-directory: src-tauri

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          releaseName: "SSX ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          releaseBody: "Unsigned Windows MSI build for personal use. Windows may show SmartScreen warnings."
          releaseDraft: true
          prerelease: true
          args: "--bundles msi"
